<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zine Blueprint Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&family=Inter:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #fdf5f8;
            --text-color: #333333;
            --header-font: 'Playfair Display', serif;
            --paragraph-font: 'Inter', sans-serif;
            --accent-border: #f1d4df;
        }

        body {
            font-family: sans-serif;
            background-color: #e0e5ec;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            border: 1px solid #d1d9e6;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            flex: 1 1 140px;
        }

        select, input[type="color"], input[type="text"], input[type="file"], button {
            margin-top: 5px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        button {
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1 1 200px;
            font-weight: bold;
        }

        button.secondary { background-color: #6c757d; }
        button.danger { background-color: #dc3545; }
        button.success { background-color: #28a745; }

        .canvas-wrapper {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            display: flex;
            justify-content: flex-start;
            padding-bottom: 20px;
        }

        #canvas-container {
            background-color: var(--bg-color);
            width: 800px;
            min-width: 800px;
            min-height: 1000px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        h1, h2, h3 {
            font-family: var(--header-font);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            font-weight: normal;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p, div[contenteditable="true"] {
            font-family: var(--paragraph-font);
            color: var(--text-color);
            line-height: 1.6;
            outline: none;
        }

        .sword-anchor {
            text-align: center;
            margin: 10px 0 30px 0;
        }

        .sword-anchor img {
            max-width: 90%;
            max-height: 80px;
            height: auto;
            object-fit: contain;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .layout-grid.one-col { grid-template-columns: 1fr; }
        .layout-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
        .layout-grid.four-col { grid-template-columns: 1fr 1fr 1fr 1fr; }

        .content-block {
            border: 1px solid var(--accent-border);
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.2s;
            padding: 0;
            flex: none;
        }
        
        .content-block:hover .delete-btn {
            opacity: 1;
        }

        .content-block h3 {
            text-align: left;
            font-style: italic;
            border-bottom: 1px solid var(--accent-border);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
            background: var(--accent-border);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background-color: #eaeff5;
            border: 1px dashed #b5c2d4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group" style="flex: 1 1 100%;">
            <label>Aesthetic Preset</label>
            <div style="display: flex; gap: 10px;">
                <select id="aestheticPreset" style="flex: 1;">
                    <option value="custom">-- Custom --</option>
                    <option value="cherrySnow">Cherry Snow Angel</option>
                    <option value="slavicWinter">Slavic Doll Wintercore</option>
                    <option value="summerModel">Summer Model</option>
                    <option value="medicalcore">Clinical / Medicalcore</option>
                    <option value="yamiKawaii">Yami Kawaii</option>
                </select>
                <button class="secondary" id="savePresetBtn" style="flex: 0 1 150px; margin-top: 5px;">Save Preset</button>
            </div>
        </div>

        <div class="control-group">
            <label>Page Background</label>
            <input type="color" id="bgColor" value="#fdf5f8">
        </div>
        <div class="control-group">
            <label>Accent / Border</label>
            <input type="color" id="accentColor" value="#f1d4df">
        </div>
        <div class="control-group">
            <label>Header Font</label>
            <select id="headerFont">
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Great Vibes', cursive">Great Vibes</option>
                <option value="'Cinzel', serif">Cinzel</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>
        <div class="control-group">
            <label>Text Font</label>
            <select id="paragraphFont">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Georgia, serif">Georgia</option>
            </select>
        </div>
        <div class="control-group">
            <label>Layout Columns</label>
            <select id="layoutStyle">
                <option value="1">1 Column</option>
                <option value="2">2 Columns</option>
                <option value="3" selected>3 Columns</option>
                <option value="4">4 Columns</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Upload Sword Graphic</label>
            <input type="file" id="swordUpload" accept="image/png, image/jpeg, image/gif, image/webp">
        </div>
        
        <div class="action-buttons">
            <button class="secondary" id="addSectionBtn">Add Section +</button>
            <button class="success" id="downloadBtn">Download Zine Image</button>
            <button class="danger" id="clearBtn">Clear & Reset</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <div id="canvas-container">
            <h1 contenteditable="true" id="mainTitle">Main Title Here</h1>
            
            <div class="sword-anchor">
                <img id="swordImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='20'><line x1='0' y1='10' x2='400' y2='10' stroke='black' stroke-width='2'/><circle cx='200' cy='10' r='5' fill='black'/></svg>" alt="Sword Divider">
            </div>

            <div class="layout-grid three-col" id="mainGrid">
                </div>
        </div>
    </div>

    <input type="file" id="hiddenImageUpload" accept="image/*" style="display: none;">

    <script>
        const root = document.documentElement;
        const grid = document.getElementById('mainGrid');
        
        // Base Presets + LocalStorage Custom Presets
        let presets = {
            cherrySnow: { bg: '#fdf5f8', accent: '#f1d4df', text: '#333333', header: "'Playfair Display', serif", font: "'Inter', sans-serif" },
            slavicWinter: { bg: '#e6f2fa', accent: '#cce0f0', text: '#2c3e50', header: "'Playfair Display', serif", font: "'Inter', sans-serif" },
            summerModel: { bg: '#eefbe6', accent: '#d3ecd3', text: '#3d4035', header: "'Cinzel', serif", font: "'Inter', sans-serif" },
            medicalcore: { bg: '#ffffff', accent: '#b3cde0', text: '#011f4b', header: "'Courier New', monospace", font: "'Inter', sans-serif" },
            yamiKawaii: { bg: '#1a1a2e', accent: '#ffb6c1', text: '#e94560', header: "'Great Vibes', cursive", font: "'Inter', sans-serif" }
        };

        // --- STATE MANAGEMENT & AUTO-SAVE ---
        
        function saveState() {
            const state = {
                title: document.getElementById('mainTitle').innerHTML,
                swordSrc: document.getElementById('swordImg').src,
                gridHtml: grid.innerHTML,
                controls: {
                    bg: document.getElementById('bgColor').value,
                    accent: document.getElementById('accentColor').value,
                    hFont: document.getElementById('headerFont').value,
                    pFont: document.getElementById('paragraphFont').value,
                    columns: document.getElementById('layoutStyle').value,
                    preset: document.getElementById('aestheticPreset').value
                }
            };
            localStorage.setItem('zineState', JSON.stringify(state));
        }

        function loadState() {
            // Load custom presets
            const savedPresets = JSON.parse(localStorage.getItem('zinePresets')) || {};
            presets = { ...presets, ...savedPresets };
            const presetSelect = document.getElementById('aestheticPreset');
            Object.keys(savedPresets).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = `* ${key} *`;
                presetSelect.appendChild(opt);
            });

            const saved = JSON.parse(localStorage.getItem('zineState'));
            if (saved) {
                // Restore Canvas
                document.getElementById('mainTitle').innerHTML = saved.title;
                document.getElementById('swordImg').src = saved.swordSrc;
                grid.innerHTML = saved.gridHtml;
                
                // Restore Controls
                document.getElementById('bgColor').value = saved.controls.bg;
                document.getElementById('accentColor').value = saved.controls.accent;
                document.getElementById('headerFont').value = saved.controls.hFont;
                document.getElementById('paragraphFont').value = saved.controls.pFont;
                document.getElementById('layoutStyle').value = saved.controls.columns;
                document.getElementById('aestheticPreset').value = saved.controls.preset;
                
                // Apply CSS
                root.style.setProperty('--bg-color', saved.controls.bg);
                root.style.setProperty('--accent-border', saved.controls.accent);
                root.style.setProperty('--header-font', saved.controls.hFont);
                root.style.setProperty('--paragraph-font', saved.controls.pFont);
                
                updateColumns(saved.controls.columns);
            } else {
                // Default Canvas generation if fresh start
                addDefaultBlocks();
            }
        }

        // Auto-save triggers
        document.getElementById('canvas-container').addEventListener('input', saveState);
        document.getElementById('canvas-container').addEventListener('DOMSubtreeModified', saveState);

        // --- CONTROL PANEL LOGIC ---

        document.getElementById('aestheticPreset').addEventListener('change', (e) => {
            const preset = presets[e.target.value];
            if(preset) {
                root.style.setProperty('--bg-color', preset.bg);
                root.style.setProperty('--accent-border', preset.accent);
                root.style.setProperty('--text-color', preset.text);
                root.style.setProperty('--header-font', preset.header);
                root.style.setProperty('--paragraph-font', preset.font);
                
                document.getElementById('bgColor').value = preset.bg;
                document.getElementById('accentColor').value = preset.accent;
                document.getElementById('headerFont').value = preset.header;
                document.getElementById('paragraphFont').value = preset.font;
                saveState();
            }
        });

        document.getElementById('savePresetBtn').addEventListener('click', () => {
            const name = prompt("Enter a name for this custom preset:");
            if (name) {
                const safeName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const newPreset = {
                    bg: document.getElementById('bgColor').value,
                    accent: document.getElementById('accentColor').value,
                    text: '#333333', // Defaulting text color
                    header: document.getElementById('headerFont').value,
                    font: document.getElementById('paragraphFont').value
                };
                
                // Save to active object and local storage
                presets[safeName] = newPreset;
                const savedPresets = JSON.parse(localStorage.getItem('zinePresets')) || {};
                savedPresets[safeName] = newPreset;
                localStorage.setItem('zinePresets', JSON.stringify(savedPresets));

                // Add to dropdown
                const opt = document.createElement('option');
                opt.value = safeName;
                opt.textContent = `* ${name} *`;
                document.getElementById('aestheticPreset').appendChild(opt);
                document.getElementById('aestheticPreset').value = safeName;
                saveState();
            }
        });

        const updateVar = (id, cssVar) => {
            document.getElementById(id).addEventListener('input', (e) => {
                root.style.setProperty(cssVar, e.target.value);
                document.getElementById('aestheticPreset').value = 'custom';
                saveState();
            });
        };
        updateVar('bgColor', '--bg-color');
        updateVar('accentColor', '--accent-border');
        updateVar('headerFont', '--header-font');
        updateVar('paragraphFont', '--paragraph-font');

        function updateColumns(val) {
            grid.className = 'layout-grid'; 
            if (val === '1') grid.classList.add('one-col');
            if (val === '3') grid.classList.add('three-col');
            if (val === '4') grid.classList.add('four-col');
        }
        document.getElementById('layoutStyle').addEventListener('change', (e) => {
            updateColumns(e.target.value);
            saveState();
        });

        // --- DYNAMIC CONTENT LOGIC ---

        function addDefaultBlocks() {
            grid.innerHTML = '';
            const defaults = [
                { header: "The Essentials:", text: "Item one<br>Item two" },
                { header: "Think:", text: "Descriptors here..." },
                { header: "Scents:", text: "Note one<br>Note two" }
            ];
            defaults.forEach(d => createBlock(d.header, d.text));
            saveState();
        }

        function createBlock(headerText = "New Section:", bodyText = "Type text here...") {
            const newBlock = document.createElement('div');
            newBlock.className = 'content-block';
            newBlock.innerHTML = `
                <button class="delete-btn" onclick="deleteSection(this)">×</button>
                <h3 contenteditable="true">${headerText}</h3>
                <div class="image-placeholder" onclick="triggerImageUpload(this)">Click to upload image</div>
                <div contenteditable="true">${bodyText}</div>
            `;
            grid.appendChild(newBlock);
            saveState();
        }

        document.getElementById('addSectionBtn').addEventListener('click', () => createBlock());

        function deleteSection(btn) {
            btn.parentElement.remove();
            saveState();
        }

        // --- IMAGE UPLOAD LOGIC ---

        document.getElementById('swordUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('swordImg').src = event.target.result;
                    saveState();
                };
                reader.readAsDataURL(file);
            }
        });

        let currentImageTarget = null;
        const hiddenUpload = document.getElementById('hiddenImageUpload');

        window.triggerImageUpload = function(element) {
            currentImageTarget = element;
            hiddenUpload.click();
        };

        hiddenUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && currentImageTarget) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageTarget.style.backgroundImage = `url('${event.target.result}')`;
                    currentImageTarget.innerHTML = "";
                    currentImageTarget.style.border = "none";
                    saveState();
                };
                reader.readAsDataURL(file);
            }
            // Reset input so the same file can be uploaded again if needed
            e.target.value = ''; 
        });

        // --- EXPORT & RESET LOGIC ---

        function triggerDownload(callback = null) {
            const canvasContainer = document.getElementById('canvas-container');
            const placeholders = document.querySelectorAll('.image-placeholder');
            const deleteBtns = document.querySelectorAll('.delete-btn');
            
            // Clean up UI elements for the screenshot
            placeholders.forEach(p => {
                if(p.innerHTML.includes("Click to upload")) {
                    p.dataset.tempText = p.innerHTML;
                    p.innerHTML = "";
                }
            });
            deleteBtns.forEach(btn => btn.style.display = 'none');

            html2canvas(canvasContainer, { useCORS: true, scale: 2 }).then(canvas => {
                // Restore UI elements
                placeholders.forEach(p => {
                    if(p.dataset.tempText) {
                        p.innerHTML = p.dataset.tempText;
                        delete p.dataset.tempText;
                    }
                });
                deleteBtns.forEach(btn => btn.style.display = 'flex');

                const link = document.createElement('a');
                link.download = `zine_layout_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                if (callback) callback();
            });
        }

        document.getElementById('downloadBtn').addEventListener('click', () => triggerDownload());

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to clear the page? It will download your current canvas first just in case!")) {
                triggerDownload(() => {
                    localStorage.removeItem('zineState');
                    // Retain custom presets by not clearing 'zinePresets'
                    location.reload();
                });
            }
        });

        // Init
        window.onload = loadState;

    </script>
</body>
</html>
