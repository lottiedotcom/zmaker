<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zine Blueprint Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&family=Inter:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf5f8;
            --text-color: #333333;
            --header-font: 'Playfair Display', serif;
            --paragraph-font: 'Inter', sans-serif;
            --accent-border: #f1d4df;
        }

        body {
            font-family: sans-serif;
            background-color: #e0e5ec;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Control Panel */
        #controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            border: 1px solid #d1d9e6;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }

        select, input[type="color"], input[type="text"] {
            margin-top: 5px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Zine Canvas */
        #canvas-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 800px;
            min-height: 1000px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Headers and Typography */
        h1, h2, h3 {
            font-family: var(--header-font);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            font-weight: normal;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p, div[contenteditable="true"] {
            font-family: var(--paragraph-font);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Sword Graphic Anchor */
        .sword-anchor {
            text-align: center;
            margin: 10px 0 30px 0;
        }

        .sword-anchor img {
            max-width: 80%;
            height: auto;
            /* Default filter to make a basic black silhouette if no custom image is used */
        }

        /* Grid Layout System */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .layout-grid.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .content-block {
            border: 1px solid var(--accent-border);
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
        }

        .content-block h3 {
            text-align: left;
            font-style: italic;
            border-bottom: 1px solid var(--accent-border);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
            background: var(--accent-border);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background-color: #eaeff5;
            border: 1px dashed #b5c2d4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>Page Background</label>
            <input type="color" id="bgColor" value="#fdf5f8">
        </div>
        <div class="control-group">
            <label>Accent / Border</label>
            <input type="color" id="accentColor" value="#f1d4df">
        </div>
        <div class="control-group">
            <label>Header Font</label>
            <select id="headerFont">
                <option value="'Playfair Display', serif">Playfair Display (Serif)</option>
                <option value="'Great Vibes', cursive">Great Vibes (Script)</option>
                <option value="'Cinzel', serif">Cinzel (Classic)</option>
                <option value="'Courier New', monospace">Courier New (Typewriter)</option>
                <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>
        <div class="control-group">
            <label>Text Font</label>
            <select id="paragraphFont">
                <option value="'Inter', sans-serif">Inter (Clean Sans)</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Georgia, serif">Georgia</option>
            </select>
        </div>
        <div class="control-group">
            <label>Layout Columns</label>
            <select id="layoutStyle">
                <option value="2">2 Columns</option>
                <option value="3">3 Columns</option>
            </select>
        </div>
        <div class="control-group">
            <label>Sword Image URL</label>
            <input type="text" id="swordUrl" placeholder="Paste image link here...">
        </div>
    </div>

    <div id="canvas-container">
        <h1 contenteditable="true">Main Title Here</h1>
        
        <div class="sword-anchor">
            <img id="swordImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='20'><line x1='0' y1='10' x2='400' y2='10' stroke='black' stroke-width='2'/><circle cx='200' cy='10' r='5' fill='black'/></svg>" alt="Sword Divider">
        </div>

        <div class="layout-grid" id="mainGrid">
            
            <div class="content-block">
                <h3 contenteditable="true">The Essentials:</h3>
                <div class="image-placeholder" onclick="addImage(this)">Click to set image URL</div>
                <div contenteditable="true">
                    Item one<br>
                    Item two<br>
                    Item three
                </div>
            </div>

            <div class="content-block">
                <h3 contenteditable="true">Think:</h3>
                <div contenteditable="true">
                    Type your mood descriptors here...
                </div>
                <br>
                <div class="image-placeholder" onclick="addImage(this)">Click to set image URL</div>
            </div>

            <div class="content-block">
                <h3 contenteditable="true">Scents:</h3>
                <div contenteditable="true">
                    Note one<br>
                    Note two<br>
                    Note three
                </div>
            </div>

            <div class="content-block">
                <h3 contenteditable="true">The Face:</h3>
                <div contenteditable="true">
                    Detail one<br>
                    Detail two
                </div>
            </div>

        </div>
    </div>

    <script>
        const root = document.documentElement;

        // Event Listeners for Controls
        document.getElementById('bgColor').addEventListener('input', (e) => {
            root.style.setProperty('--bg-color', e.target.value);
        });

        document.getElementById('accentColor').addEventListener('input', (e) => {
            root.style.setProperty('--accent-border', e.target.value);
        });

        document.getElementById('headerFont').addEventListener('change', (e) => {
            root.style.setProperty('--header-font', e.target.value);
        });

        document.getElementById('paragraphFont').addEventListener('change', (e) => {
            root.style.setProperty('--paragraph-font', e.target.value);
        });

        document.getElementById('layoutStyle').addEventListener('change', (e) => {
            const grid = document.getElementById('mainGrid');
            if (e.target.value === '3') {
                grid.classList.add('three-col');
            } else {
                grid.classList.remove('three-col');
            }
        });

        document.getElementById('swordUrl').addEventListener('input', (e) => {
            const img = document.getElementById('swordImg');
            if (e.target.value.trim() !== '') {
                img.src = e.target.value;
            }
        });

        // Simple function to add background images to placeholders
        function addImage(element) {
            const url = prompt("Enter image URL:");
            if (url) {
                element.style.backgroundImage = `url('${url}')`;
                element.innerHTML = "";
                element.style.border = "none";
            }
        }
    </script>
</body>
</html>
