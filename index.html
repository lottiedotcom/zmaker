<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zine Blueprint Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&family=Inter:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #fdf5f8;
            --text-color: #333333;
            --header-font: 'Playfair Display', serif;
            --paragraph-font: 'Inter', sans-serif;
            --accent-border: #f1d4df;
        }

        body {
            font-family: sans-serif;
            background-color: #e0e5ec;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            border: 1px solid #d1d9e6;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            flex: 1 1 140px;
        }

        select, input[type="color"], input[type="text"], input[type="file"], button {
            margin-top: 5px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        button {
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
        }

        button.secondary {
            background-color: #888;
        }

        .canvas-wrapper {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            display: flex;
            justify-content: flex-start;
            padding-bottom: 20px;
        }

        #canvas-container {
            background-color: var(--bg-color);
            width: 800px;
            min-width: 800px;
            min-height: 1000px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        h1, h2, h3 {
            font-family: var(--header-font);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            font-weight: normal;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p, div[contenteditable="true"] {
            font-family: var(--paragraph-font);
            color: var(--text-color);
            line-height: 1.6;
        }

        .sword-anchor {
            text-align: center;
            margin: 10px 0 30px 0;
        }

        /* Auto-scaling constraints for the uploaded sword */
        .sword-anchor img {
            max-width: 90%;
            max-height: 80px;
            height: auto;
            object-fit: contain;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .layout-grid.one-col { grid-template-columns: 1fr; }
        .layout-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
        .layout-grid.four-col { grid-template-columns: 1fr 1fr 1fr 1fr; }

        .content-block {
            border: 1px solid var(--accent-border);
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .content-block h3 {
            text-align: left;
            font-style: italic;
            border-bottom: 1px solid var(--accent-border);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
            background: var(--accent-border);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background-color: #eaeff5;
            border: 1px dashed #b5c2d4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group" style="flex: 1 1 100%;">
            <label>Aesthetic Preset</label>
            <select id="aestheticPreset">
                <option value="custom">-- Custom --</option>
                <option value="cherrySnow">Cherry Snow Angel</option>
                <option value="slavicWinter">Slavic Doll Wintercore</option>
                <option value="summerModel">Summer Model</option>
                <option value="medicalcore">Clinical / Medicalcore</option>
                <option value="yamiKawaii">Yami Kawaii</option>
            </select>
        </div>

        <div class="control-group">
            <label>Page Background</label>
            <input type="color" id="bgColor" value="#fdf5f8">
        </div>
        <div class="control-group">
            <label>Accent / Border</label>
            <input type="color" id="accentColor" value="#f1d4df">
        </div>
        <div class="control-group">
            <label>Header Font</label>
            <select id="headerFont">
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Great Vibes', cursive">Great Vibes</option>
                <option value="'Cinzel', serif">Cinzel</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>
        <div class="control-group">
            <label>Text Font</label>
            <select id="paragraphFont">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Georgia, serif">Georgia</option>
            </select>
        </div>
        <div class="control-group">
            <label>Layout Columns</label>
            <select id="layoutStyle">
                <option value="1">1 Column</option>
                <option value="2">2 Columns</option>
                <option value="3" selected>3 Columns</option>
                <option value="4">4 Columns</option>
            </select>
        </div>
        
        <!-- Updated Sword Upload Field -->
        <div class="control-group">
            <label>Upload Sword Graphic</label>
            <input type="file" id="swordUpload" accept="image/png, image/jpeg, image/gif, image/webp">
        </div>
        
        <div class="action-buttons">
            <button class="secondary" id="addSectionBtn">Add New Section +</button>
            <button id="downloadBtn">Download Zine Image</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <div id="canvas-container">
            <h1 contenteditable="true">Main Title Here</h1>
            
            <div class="sword-anchor">
                <img id="swordImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='20'><line x1='0' y1='10' x2='400' y2='10' stroke='black' stroke-width='2'/><circle cx='200' cy='10' r='5' fill='black'/></svg>" alt="Sword Divider">
            </div>

            <div class="layout-grid three-col" id="mainGrid">
                
                <div class="content-block">
                    <h3 contenteditable="true">The Essentials:</h3>
                    <div class="image-placeholder" onclick="addImage(this)">Click to set image URL</div>
                    <div contenteditable="true">
                        Item one<br>Item two<br>Item three
                    </div>
                </div>

                <div class="content-block">
                    <h3 contenteditable="true">Think:</h3>
                    <div contenteditable="true">Type your mood descriptors here...</div>
                    <br>
                    <div class="image-placeholder" onclick="addImage(this)">Click to set image URL</div>
                </div>

                <div class="content-block">
                    <h3 contenteditable="true">Scents:</h3>
                    <div contenteditable="true">Note one<br>Note two<br>Note three</div>
                </div>

                <div class="content-block">
                    <h3 contenteditable="true">The Face:</h3>
                    <div contenteditable="true">Detail one<br>Detail two</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const grid = document.getElementById('mainGrid');

        const presets = {
            cherrySnow: { bg: '#fdf5f8', accent: '#f1d4df', text: '#333333', header: "'Playfair Display', serif", font: "'Inter', sans-serif" },
            slavicWinter: { bg: '#e6f2fa', accent: '#cce0f0', text: '#2c3e50', header: "'Playfair Display', serif", font: "'Inter', sans-serif" },
            summerModel: { bg: '#eefbe6', accent: '#d3ecd3', text: '#3d4035', header: "'Cinzel', serif", font: "'Inter', sans-serif" },
            medicalcore: { bg: '#ffffff', accent: '#b3cde0', text: '#011f4b', header: "'Courier New', monospace", font: "'Inter', sans-serif" },
            yamiKawaii: { bg: '#1a1a2e', accent: '#ffb6c1', text: '#e94560', header: "'Great Vibes', cursive", font: "'Inter', sans-serif" }
        };

        // Apply Aesthetic Preset
        document.getElementById('aestheticPreset').addEventListener('change', (e) => {
            const preset = presets[e.target.value];
            if(preset) {
                root.style.setProperty('--bg-color', preset.bg);
                root.style.setProperty('--accent-border', preset.accent);
                root.style.setProperty('--text-color', preset.text);
                root.style.setProperty('--header-font', preset.header);
                root.style.setProperty('--paragraph-font', preset.font);
                
                document.getElementById('bgColor').value = preset.bg;
                document.getElementById('accentColor').value = preset.accent;
                document.getElementById('headerFont').value = preset.header;
                document.getElementById('paragraphFont').value = preset.font;
            }
        });

        // Manual Variables Update
        document.getElementById('bgColor').addEventListener('input', (e) => root.style.setProperty('--bg-color', e.target.value));
        document.getElementById('accentColor').addEventListener('input', (e) => root.style.setProperty('--accent-border', e.target.value));
        document.getElementById('headerFont').addEventListener('change', (e) => root.style.setProperty('--header-font', e.target.value));
        document.getElementById('paragraphFont').addEventListener('change', (e) => root.style.setProperty('--paragraph-font', e.target.value));

        // Layout Columns Update
        document.getElementById('layoutStyle').addEventListener('change', (e) => {
            grid.className = 'layout-grid'; 
            if (e.target.value === '1') grid.classList.add('one-col');
            if (e.target.value === '3') grid.classList.add('three-col');
            if (e.target.value === '4') grid.classList.add('four-col');
        });

        // Add New Section
        document.getElementById('addSectionBtn').addEventListener('click', () => {
            const newBlock = document.createElement('div');
            newBlock.className = 'content-block';
            newBlock.innerHTML = `
                <h3 contenteditable="true">New Section:</h3>
                <div class="image-placeholder" onclick="addImage(this)">Click to set image URL</div>
                <div contenteditable="true">Type text here...</div>
            `;
            grid.appendChild(newBlock);
        });

        // Sword Local File Upload Logic
        document.getElementById('swordUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('swordImg').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Add Image URL Logic
        function addImage(element) {
            const url = prompt("Enter image URL:");
            if (url) {
                element.style.backgroundImage = `url('${url}')`;
                element.innerHTML = "";
                element.style.border = "none";
            }
        }

        // Export to PNG
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const canvasContainer = document.getElementById('canvas-container');
            const placeholders = document.querySelectorAll('.image-placeholder');
            
            placeholders.forEach(p => {
                if(p.innerHTML.includes("Click to set")) {
                    p.dataset.tempText = p.innerHTML;
                    p.innerHTML = "";
                }
            });

            html2canvas(canvasContainer, { useCORS: true, scale: 2 }).then(canvas => {
                placeholders.forEach(p => {
                    if(p.dataset.tempText) {
                        p.innerHTML = p.dataset.tempText;
                        delete p.dataset.tempText;
                    }
                });

                const link = document.createElement('a');
                link.download = `zine_layout_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
